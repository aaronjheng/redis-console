name: Code Quality

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install tools
        run: brew install swiftlint

      - name: SwiftLint
        run: swiftlint lint Sources

      - name: Swift Format
        run: swift format lint --recursive Sources
