name: Code Quality

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install tools
        run: |
          brew install swiftlint swift-format

      - name: SwiftLint
        run: swiftlint lint Sources

      - name: Swift Format
        run: swift-format lint --recursive Sources
