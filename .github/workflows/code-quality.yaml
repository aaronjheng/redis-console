name: Code Quality

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install tools
        run: brew install swiftlint

      - name: SwiftLint
        run: swiftlint lint Sources

      - name: Swift Format
        run: swift format lint --recursive Sources
